# Default synthetic GCDformer training config.
# These settings mirror the main paper architecture but use only 10 epochs for
# a quick public sanity run. Increase epochs/steps for real training.
output: checkpoints/gcdformer_synthetic.pt

model:
  input_dim: 2
  output_dim: 2
  data_embed_dim: 224
  label_embed_dim: 32
  n_layer: 6
  n_head: 4
  max_label_id: 1000
  use_positional_embeddings: false
  max_sequence_length: 3000

synthetic:
  data_dim: 2
  batch_size: 16
  sequence_length: 3000
  max_clusters: 200
  min_clusters: 2
  max_label_id: 1000
  spread: 20.0
  std_min: 0.2
  std_max: 3.0
  mask_probability: 0.5
  fully_masked_cluster_probability: 0.25
  normalize_range: 1.0

training:
  epochs: 10
  steps_per_epoch: 100
  lr: 0.0001
  weight_decay: 0.0001
  margin: 1.0
  device: auto
